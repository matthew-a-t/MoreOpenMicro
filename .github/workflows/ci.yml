name: ci

on:
  pull_request:
  push:
    branches: [main, 'feat/**']
  workflow_dispatch:

# A push to feat/** and a PR from that same branch would otherwise run verify
# twice. head_ref (PR source branch) and ref_name (push branch) are both the
# bare branch name, so the two events share a group and the newer run
# supersedes the older. (github.ref would not dedupe: it is refs/heads/<branch>
# on push but refs/pull/<n>/merge on PR.)
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  verify:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run verify
