name: release

# Fork-local releases: verify + GitHub Release only. The npm publish step was
# removed — the `openmicro` npm name and its trusted-publishing (OIDC) binding
# belong to the upstream repo, so a fork tag could never publish it.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: npm ci
      - run: npm run verify
      # Tags alone don't show under "Releases" — create the Release object too.
      # Notes come from the tag's CHANGELOG.md section; fall back to generated
      # notes if the section is missing so a release never fails on a doc gap.
      - run: |
          awk -v ver="${GITHUB_REF_NAME#v}" \
            '$0 ~ "^## \\[" ver "\\]" {found=1; next} /^## \[/ {found=0} found' \
            CHANGELOG.md > release-notes.md
          if [ -s release-notes.md ]; then
            gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --notes-file release-notes.md
          else
            gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --generate-notes
          fi
        env:
          GH_TOKEN: ${{ github.token }}
